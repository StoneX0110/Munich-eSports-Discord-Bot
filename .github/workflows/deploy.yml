# .github/workflows/deploy.yml
name: Deploy bot

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy over SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_HOST: csgo.munich-esports.de
          SSH_USER: stonex
          SSH_PORT: "9999"
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p "$SSH_PORT" -H "$SSH_HOST" >> ~/.ssh/known_hosts

          ssh -i ~/.ssh/deploy_key -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" '
            set -e
            cd ~/discord-bot
            git fetch origin main
            git reset --hard origin/main
            venv/bin/python -m pip install -r requirements.txt
            XDG_RUNTIME_DIR=/run/user/$(id -u) systemctl --user restart discord-bot.service
            XDG_RUNTIME_DIR=/run/user/$(id -u) systemctl --user --no-pager --full status discord-bot.service
          '
